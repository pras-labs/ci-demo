name: Container

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SCA_REPORT_DIR: reports/sca

jobs:
  # ===========================================================
  # BUILD - rootless BuildKit, extract digest, generate dotenv
  # Equivalent to container:build using moby/buildkit:rootless.
  # Triggers after security-gate passes (via workflow_run) or
  # directly when called from a matrix/manual dispatch.
  # ===========================================================

  build:
    name: container:build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # .on-container: all events on_success
    outputs:
      image-url: ${{ steps.digest.outputs.image_url }}
      image-tag: ${{ steps.meta.outputs.tags }}
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up BuildKit (rootless equivalent)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max
          platforms: linux/amd64
          # Generate SLSA provenance attestation (SLSA Level 2+)
          # Equivalent to RUNNER_GENERATE_ARTIFACTS_METADATA: "true" in GitLab
          provenance: true
          sbom: false # we generate image SBOM explicitly in container:provenance

      - name: Extract image digest
        id: digest
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE_URL="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "image_url=${IMAGE_URL}" >> $GITHUB_OUTPUT
          echo "IMAGE_URL=${IMAGE_URL}" >> $GITHUB_ENV
          echo "📦 Image: ${IMAGE_URL}"
          # Write to file for cross-workflow artifact consumption
          echo "${IMAGE_URL}" > image-url.txt

      - name: Upload build outputs (image URL for downstream jobs)
        uses: actions/upload-artifact@v6
        with:
          name: build-outputs
          path: image-url.txt
          retention-days: 1

  # ===========================================================
  # IMAGE SCAN - trivy image (post-push, catches layer CVEs)
  # Equivalent to container:scan using trivy image $IMAGE_URL.
  # ===========================================================

  container-scan:
    name: container:scan (trivy image)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build]
    permissions:
      contents: read
      packages: read
      security-events: write # upload SARIF
    steps:
      - uses: actions/checkout@v6

      - name: Create SCA_REPORT_DIR
        run: mkdir -p ${{ env.SCA_REPORT_DIR }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Scan image for CVEs (HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ needs.build.outputs.image-url }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: json
          output: ${{ env.SCA_REPORT_DIR }}/trivy-image.json
          cache-dir: ~/.cache/trivy

      - name: Human-readable summary
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ needs.build.outputs.image-url }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "0"
          format: table
          cache-dir: ~/.cache/trivy

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: container-scan
          path: ${{ env.SCA_REPORT_DIR }}/trivy-image.json
          retention-days: 7

  # ===========================================================
  # SIGN - cosign keyless signing + Rekor transparency log
  # Equivalent to container:sign using OIDC token.
  # ===========================================================

  container-sign:
    name: container:sign (cosign + rekor)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [build]
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless OIDC signing
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v3.0.5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image (keyless via GitHub OIDC -> Rekor)
        run: |
          cosign sign --yes ${{ needs.build.outputs.image-url }}
          echo "✅ Image signed and recorded in Rekor transparency log"

  # ===========================================================
  # PROVENANCE - SLSA provenance + image SBOM attestation
  # Equivalent to container:provenance using cosign attest.
  # ===========================================================

  container-provenance:
    name: container:provenance + sbom attestation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build]
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless
    steps:
      - uses: actions/checkout@v6

      - name: Create SCA_REPORT_DIR
        run: mkdir -p ${{ env.SCA_REPORT_DIR }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v3.0.5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: Generate image-level SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ${{ needs.build.outputs.image-url }}
          format: cyclonedx
          output: ${{ env.SCA_REPORT_DIR }}/sbom-image.cdx.json
          exit-code: "0"
          cache-dir: ~/.cache/trivy

      - name: Attach CycloneDX SBOM attestation to registry
        run: |
          cosign attest \
            --predicate ${{ env.SCA_REPORT_DIR }}/sbom-image.cdx.json \
            --type cyclonedx \
            --yes \
            ${{ needs.build.outputs.image-url }}
          echo "✅ Image SBOM attestation attached to registry"

      - uses: actions/upload-artifact@v6
        with:
          name: sbom-image
          path: ${{ env.SCA_REPORT_DIR }}/sbom-image.cdx.json
          retention-days: 30

  # ===========================================================
  # VERIFY - cosign verify all attestations
  # Equivalent to container:verify.
  # ===========================================================

  container-verify:
    name: container:verify attestations
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [build, container-sign, container-provenance]
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v3.0.5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ needs.build.outputs.image-url }}

      - name: Verify CycloneDX SBOM attestation
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "https://github.com" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ needs.build.outputs.image-url }} > /dev/null
          echo "✅ All attestations verified"

  # -- Container gate ----------------------------------------
  container-gate:
    name: container:gate
    runs-on: ubuntu-24.04
    needs: [container-scan, container-verify]
    steps:
      - run: echo "✅ Container security gate passed"
